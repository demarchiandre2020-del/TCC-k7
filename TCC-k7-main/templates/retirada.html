<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrada/Saída de Material - Almoxarifado</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- SweetAlert2 -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.0/dist/sweetalert2.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style2.css') }}">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>

<nav id="navbar" class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center fw-bold" href="/estoque">
            <img src="{{ url_for('static', filename='senai2.png') }}" id="logo" style="width: 120px; height: auto;" alt="Logo SENAI">
            <span class="ms-2 text-white">Almoxarifado</span>
        </a>

        <button class="navbar-toggler text-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/estoque">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/retirada">Retirada</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/historico">Histórico</a>
                </li>
                {% if permisao == 1 %}
                <li class="nav-item">
                    <a class="nav-link" href="/cadastrar">Cadastrar Usuário</a>
                </li>
                {% endif %}
                <li class="nav-item">
                    <a class="nav-link text-danger fw-bold ms-3" href="/logout">Sair <i class="fa-solid fa-right-from-bracket"></i></a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div id="elemento"">
    <div id="card">
        <h3 id="titulo-card" class="mb-4">Solicitação de Entrada/Saída</h3>

        <form id="formMovimentacao" onsubmit="event.preventDefault(); enviarSolicitacao();">
            <!-- Seleção do Item -->
            <div class="mb-3">
                <label for="itemSelect" class="form-label fw-bold">Item do Estoque *</label>
                <select class="form-select" id="itemSelect" onchange="atualizarEstoqueDisponivel()" required>
                    <option value="" disabled selected>Selecione um item...</option>
                    {% for item in items %}
                    <option value="{{ item.id }}" data-qtd="{{ item.quantidade }}">{{ item.nome }}</option>
                    {% endfor %}
                </select>
                <div id="estoqueDisponivelContainer" class="form-text mt-2 d-none">
                    Quantidade atual em estoque: <span id="estoqueDisponivelVal" class="badge bg-secondary">0</span>
                </div>
            </div>

            <!-- Tipo de Movimentação -->
            <div class="mb-3">
                <label class="form-label fw-bold d-block">Tipo de Operação *</label>
                <div class="btn-group w-100" role="group">
                    <input type="radio" class="btn-check" name="tipoMovimentacao" id="tipoEntrada" value="entrada" checked onchange="toggleFinalidade()">
                    <label class="btn btn-outline-success py-2 fw-bold" for="tipoEntrada">
                        <i class="fa-solid fa-arrow-turn-down"></i> Entrada (Devolução / Abastecimento)
                    </label>

                    <input type="radio" class="btn-check" name="tipoMovimentacao" id="tipoSaida" value="saida" onchange="toggleFinalidade()">
                    <label class="btn btn-outline-warning py-2 fw-bold text-dark" for="tipoSaida">
                        <i class="fa-solid fa-arrow-turn-up"></i> Saída (Retirada de Material)
                    </label>
                </div>
            </div>

            <!-- Quantidade -->
            <div class="mb-3">
                <label for="movQuantidade" class="form-label fw-bold">Quantidade *</label>
                <input type="number" class="form-control" id="movQuantidade" min="1" value="1" required>
            </div>

            <!-- Finalidade (Mostrada apenas para Saída) -->
            <div class="mb-4 d-none" id="finalidadeContainer">
                <label for="movFinalidade" class="form-label fw-bold">Finalidade / Destino *</label>
                <textarea class="form-control" id="movFinalidade" rows="3" placeholder="Ex: Aula do professor Roger / Manutenção no laboratório 2 / Volkswagen..."></textarea>
                <div class="form-text text-danger">A finalidade é obrigatória para saídas de material.</div>
            </div>

            <!-- Botões de Envio -->
            <div class="d-flex justify-content-between mt-4">
                <a href="/estoque" class="btn btn-secondary px-4 py-2">Cancelar</a>
                <button type="submit" class="btn btn-primary px-4 py-2 fw-bold">Confirmar Solicitação</button>
            </div>
        </form>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- SweetAlert2 JS -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.0/dist/sweetalert2.all.min.js"></script>

<script>
// Mostra a quantidade disponível do item selecionado
function atualizarEstoqueDisponivel() {
    const select = document.getElementById("itemSelect");
    const selectedOption = select.options[select.selectedIndex];
    const qtdContainer = document.getElementById("estoqueDisponivelContainer");
    const qtdVal = document.getElementById("estoqueDisponivelVal");

    if (selectedOption && selectedOption.value) {
        const qtd = selectedOption.getAttribute("data-qtd");
        qtdVal.innerText = qtd;
        
        // Estiliza a cor com base no estoque
        if (parseInt(qtd) <= 0) {
            qtdVal.className = "badge bg-danger";
        } else {
            qtdVal.className = "badge bg-success";
        }
        
        qtdContainer.classList.remove("d-none");
    } else {
        qtdContainer.classList.add("d-none");
    }
}

// Exibe/oculta o campo de finalidade com base no tipo de movimentação
function toggleFinalidade() {
    const isSaida = document.getElementById("tipoSaida").checked;
    const finalidadeContainer = document.getElementById("finalidadeContainer");
    const finalidadeTextarea = document.getElementById("movFinalidade");

    if (isSaida) {
        finalidadeContainer.classList.remove("d-none");
        finalidadeTextarea.setAttribute("required", "required");
    } else {
        finalidadeContainer.classList.add("d-none");
        finalidadeTextarea.removeAttribute("required");
        finalidadeTextarea.value = ""; // Limpa o valor
    }
}

// Envia a requisição de entrada/saída para o backend
async function enviarSolicitacao() {
    const item_id = document.getElementById("itemSelect").value;
    const quantidade = document.getElementById("movQuantidade").value;
    const tipo = document.querySelector('input[name="tipoMovimentacao"]:checked').value;
    const finalidade = document.getElementById("movFinalidade").value.trim();

    if (!item_id || quantidade <= 0) {
        Swal.fire({
            icon: 'warning',
            title: 'Atenção',
            text: 'Por favor, preencha todos os campos obrigatórios (*)!',
            confirmButtonColor: '#35437A'
        });
        return;
    }

    if (tipo === 'saida' && !finalidade) {
        Swal.fire({
            icon: 'warning',
            title: 'Campo obrigatório',
            text: 'A finalidade é obrigatória para saídas de material.',
            confirmButtonColor: '#35437A'
        });
        return;
    }

    try {
        const response = await fetch("/api/movimentacao", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ item_id, quantidade, tipo, finalidade })
        });

        const data = await response.json();

        if (response.ok && data.success) {
            Swal.fire({
                icon: 'success',
                title: 'Sucesso',
                text: 'Movimentação realizada com sucesso!',
                timer: 1500,
                showConfirmButton: false
            });
            setTimeout(() => {
                window.location.href = "/estoque";
            }, 1500);
        } else {
            Swal.fire({
                icon: 'error',
                title: 'Falha na Operação',
                text: data.error || 'Erro ao realizar a movimentação.',
                confirmButtonColor: '#35437A'
            });
        }
    } catch (error) {
        console.error(error);
        Swal.fire({
            icon: 'error',
            title: 'Erro de Conexão',
            text: 'Não foi possível se conectar ao servidor.',
            confirmButtonColor: '#35437A'
        });
    }
}
</script>

</body>
</html>
