<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Almoxarifado SENAI</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- SweetAlert2 -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.0/dist/sweetalert2.min.css" rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div id="container">
    <!-- Painel Esquerdo: Carrossel de Fotos -->
    <div id="carrossel">
        <div id="carouselExampleInterval" class="carousel slide h-100" data-bs-ride="carousel">
            <div class="carousel-inner h-100">
                <div class="carousel-item active h-100" data-bs-interval="3000">
                    <img src="{{ url_for('static', filename='robotista.jpg') }}" class="d-block w-100 h-100 object-fit-cover" alt="Robotica">
                </div>
                <div class="carousel-item h-100" data-bs-interval="3000">
                    <img src="{{ url_for('static', filename='eletronica2.jpg') }}" class="d-block w-100 h-100 object-fit-cover" alt="Eletronica">
                </div>
                <div class="carousel-item h-100" data-bs-interval="3000">
                    <img src="{{ url_for('static', filename='cursos-tecnicos.jpg') }}" class="d-block w-100 h-100 object-fit-cover" alt="Cursos Tecnicos">
                </div>
            </div>
        </div>
    </div>

    <!-- Painel Direito: Formulário de Login -->
    <div id="corpo">
        <form id="login-box" onsubmit="event.preventDefault(); login();">
            <div class="text-center">
                <img src="{{ url_for('static', filename='senai2.png') }}" id="logo" alt="SENAI Logo">
            </div>

            <div class="mb-3">
                <label for="matricula">Matrícula:</label>
                <input type="text"
                       id="matricula"
                       name="matricula"
                       class="form-control"
                       placeholder="Digite sua matrícula"
                       required>
            </div>

            <div class="mb-3">
                <label for="email">E-mail:</label>
                <input type="email"
                       name="email"
                       id="email"
                       class="form-control"
                       placeholder="Digite seu E-mail"
                       required>
            </div>

            <div class="mb-3">
                <label for="password">Senha:</label>
                <input type="password"
                       name="password"
                       id="password"
                       class="form-control"
                       placeholder="Digite sua Senha"
                       required>
            </div>

            <div id="botao_usu_adm" class="mb-3">
                <input type="radio"
                       class="btn-check"
                       name="tipo"
                       id="usuario"
                       value="usuario"
                       checked>
                <label class="btn btn-outline-light me-2" for="usuario">
                    Usuário
                </label>

                <input type="radio"
                       class="btn-check"
                       name="tipo"
                       id="admin"
                       value="admin">
                <label class="btn btn-outline-light" for="admin">
                    Admin
                </label>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3 py-2 fw-bold">
                Entrar
            </button>

            <div class="text-center text-white-50 mb-2">
                Cadastrar Usuário?
            </div>

            <!-- Botão de cadastro, habilitado apenas quando "Admin" é selecionado -->
            <button id="cadastrar" type="button" onclick="irParaCadastro()" class="btn btn-secondary w-100 py-2 fw-bold" disabled>
                Cadastrar
            </button>
        </form>
    </div>
</div>

<!-- SweetAlert2 JS -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.0/dist/sweetalert2.all.min.js"></script>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
const usuarioRadio = document.getElementById("usuario");
const adminRadio = document.getElementById("admin");
const cadastrarBtn = document.getElementById("cadastrar");

// Controla a ativação do botão Cadastrar com base no tipo selecionado
adminRadio.addEventListener("change", () => {
    cadastrarBtn.disabled = !adminRadio.checked;
});

usuarioRadio.addEventListener("change", () => {
    cadastrarBtn.disabled = usuarioRadio.checked;
});

function irParaCadastro() {
    window.location.href = "/cadastrar";
}

async function login() {
    const matricula = document.getElementById("matricula").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const tipo = document.querySelector('input[name="tipo"]:checked').value;

    if (!matricula || !email || !password) {
        Swal.fire({
            icon: 'warning',
            title: 'Campos vazios',
            text: 'Por favor, preencha todos os campos.',
            confirmButtonColor: '#365AEB'
        });
        return;
    }

    try {
        const response = await fetch("/api/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                matricula,
                email,
                password,
                tipo
            })
        });

        const data = await response.json();

        if (data.success) {
            Swal.fire({
                icon: 'success',
                title: 'Sucesso',
                text: 'Login realizado com sucesso! Redirecionando...',
                timer: 1500,
                showConfirmButton: false
            });
            setTimeout(() => {
                window.location.href = "/estoque";
            }, 1500);
        } else {
            Swal.fire({
                icon: 'error',
                title: 'Erro',
                text: data.error || "Login inválido. Verifique suas credenciais.",
                confirmButtonColor: '#365AEB'
            });
        }

    } catch (error) {
        console.error(error);
        Swal.fire({
            icon: 'error',
            title: 'Erro de conexão',
            text: 'Não foi possível conectar ao servidor.',
            confirmButtonColor: '#365AEB'
        });
    }
}
</script>

</body>
</html>
