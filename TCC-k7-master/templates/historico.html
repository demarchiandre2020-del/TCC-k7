<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/style4.css">
</head>
<body>

<nav id="navbar" class="navbar navbar-expand-lg navbar-custom fixed-top">
    <img src="../static/senai2.png" id="logo">
    <div class="container-fluid">


        <a class="navbar-brand ms-2 fw-bold" href="#">Almoxarifado</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="#">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Retirada</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Estoque</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
  
<div id="elemento">
    <div id="card">
        
        <h3 id="titulo">Histórico de Movimentações</h3>

        <table class="table table-striped table-hover" id="tabela">
            <thead>
                <tr>
                    <th>usuario</th>
                    <th>email</th>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Quantidade</th>
                    <th>Categoria</th>
                </tr>
            </thead>
            <tbody>
                {% for item in data %}
                <tr>
                    <td>{{ usuario }}</td>
                    <td>{{ email }}</td>
                    <td>{{ item.id }}</td>
                    <td>{{ item.nome }}</td>
                    <td>{{ item.quantidade }}</td>
                    <td>{{ item.categoria }}</td>

                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
