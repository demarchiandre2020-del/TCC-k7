<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Controle de Almoxarifado</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div id="container">
    <!-- Seção Esquerda: Carrossel de Imagens Moderno -->
    <div id="carrossel">
        <div id="carouselExampleInterval" class="carousel slide h-100" data-bs-ride="carousel" data-bs-interval="4000">
            <div class="carousel-inner h-100">
                <div class="carousel-item active h-100">
                    <img src="{{ url_for('static', filename='robotista.jpg') }}" alt="Robotica">
                </div>
                <div class="carousel-item h-100">
                    <img src="{{ url_for('static', filename='eletronica2.jpg') }}" alt="Eletrônica">
                </div>
                <div class="carousel-item h-100">
                    <img src="{{ url_for('static', filename='cursos-tecnicos.jpg') }}" alt="Cursos Técnicos">
                </div>
            </div>
        </div>
    </div>

    <!-- Seção Direita: Corpo do Formulário -->
    <div id="corpo">
        <div id="login-box" class="glass-panel text-center">
            <img src="{{ url_for('static', filename='senai_sao_paulo_logo.png') }}" id="logo" alt="Logo SENAI" style="max-width: 260px; margin: 0 auto 1.5rem; display: block; filter: brightness(0) invert(1);">
            <h4 class="mb-4 fw-bold text-white">Criar Nova Conta</h4>

            <!-- Mensagens de Alerta/Sucesso -->
            <div id="alert-box" class="alert alert-danger d-none p-2 mb-3" role="alert" style="font-size: 0.85rem; border-radius: 10px;"></div>
            <div id="success-box" class="alert alert-success d-none p-2 mb-3" role="alert" style="font-size: 0.85rem; border-radius: 10px;"></div>

            <form id="form-cadastro">
                <div class="mb-3 text-start">
                    <label class="form-label-custom">Nome Completo</label>
                    <input type="text" id="nome" class="form-control form-control-custom" placeholder="Digite seu nome" required>
                </div>

                <div class="mb-3 text-start">
                    <label class="form-label-custom">E-mail</label>
                    <input type="email" id="email" class="form-control form-control-custom" placeholder="exemplo@gmail.com" required>
                </div>

                <div class="mb-3 text-start">
                    <label class="form-label-custom">Senha (mín. 6 caracteres)</label>
                    <input type="password" id="password" class="form-control form-control-custom" placeholder="••••••••" required minlength="6">
                </div>

                <div class="mb-4 text-start">
                    <label class="form-label-custom">Confirmar Senha</label>
                    <input type="password" id="confirm-password" class="form-control form-control-custom" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary-custom w-100 mb-4">
                    Registrar Conta
                </button>

                <div class="divider text-secondary mb-3" style="font-size: 0.85rem; position: relative;">
                    <span style="background: #0f172a; padding: 0 10px; position: relative; z-index: 2;">Já tem uma conta?</span>
                    <hr style="position: absolute; top: 50%; left: 0; width: 100%; margin: 0; border-color: var(--border-color); z-index: 1;">
                </div>

                <button type="button" onclick="location.href='/'" class="btn btn-secondary-custom w-100">
                    Fazer Login
                </button>
            </form>
        </div>
    </div>
</div>

<!-- Bootstrap Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Register Handler Script -->
<script>
document.getElementById('form-cadastro').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const nome = document.getElementById('nome').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm-password').value;
    const alertBox = document.getElementById('alert-box');
    const successBox = document.getElementById('success-box');
    
    // Resetar alertas
    alertBox.classList.add('d-none');
    successBox.classList.add('d-none');
    
    // Validar se as senhas coincidem
    if (password !== confirmPassword) {
        alertBox.textContent = 'As senhas não coincidem.';
        alertBox.classList.remove('d-none');
        return;
    }
    
    try {
        const response = await fetch('/api/register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ nome, email, password })
        });
        
        const data = await response.json();
        
        if (response.ok && data.success) {
            successBox.textContent = 'Conta criada com sucesso! Redirecionando...';
            successBox.classList.remove('d-none');
            document.getElementById('form-cadastro').reset();
            setTimeout(() => {
                window.location.href = '/';
            }, 2000);
        } else {
            alertBox.textContent = data.error || 'Erro ao criar conta.';
            alertBox.classList.remove('d-none');
        }
    } catch (error) {
        console.error('Erro:', error);
        alertBox.textContent = 'Erro ao conectar ao servidor.';
        alertBox.classList.remove('d-none');
    }
});
</script>

</body>
</html>
