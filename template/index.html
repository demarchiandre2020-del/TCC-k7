<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/style.css">
</head>

<body>

<div id="container">

    <div id="carrossel">

        <div id="carouselExampleInterval" class="carousel slide" data-bs-ride="carousel">
            
            <div class="carousel-inner">

                <div class="carousel-item active" data-bs-interval="3000">
                    <img src="../static/robotista.jpg" class="d-block w-100">
                </div>

                <div class="carousel-item" data-bs-interval="3000">
                    <img src="../static/eletronica2.jpg" class="d-block w-100">
                </div>

                <div class="carousel-item">
                    <img src="../static/cursos-tecnicos.jpg" class="d-block w-100">


                </div>
            </div>
        </div>
    </div>

    <div id="corpo">


<div id="login-box">

    <img src="../static/senai2.png" id="logo">

    
    <div class="mb-3">
        <label><br>Usuário:</label>
        <input type="text" class="form-control" placeholder="Digite seu Nome">
    </div>

    <div class="mb-3">
        <label>E-mail:</label>
        <input type="email" class="form-control" placeholder="Digite seu E-mail">
    </div>

    <div class="mb-3">
        <label>Senha:</label>
        <input type="password" class="form-control" placeholder="Digite sua Senha"> 
    </div>

    <div id=botao_usu_adm>
    <div class="btn-group btn-group-toggle" data-toggle="buttons">

        <label class="btn btn-secondary active">
            <input type="radio" name="options" id="option1" autocomplete="off" checked> Usuario
        </label>

        <label class="btn btn-secondary">
            <input type="radio" name="options" id="option2" autocomplete="off"> Admin
        </label>
    </div>
    </div>
    <br>
    <button class="btn btn-primary w-100 mb-2">
        Entrar
        <a href="localhost:5000/estoque"></a>
    </button>



    <p style="text-align: center;">
        <br>Não tem conta?
    </p>

    <button class="btn btn-success w-100">Cadastrar-se</button>


</div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
