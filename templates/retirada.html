<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retirada</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/style2.css">
</head>

<body>

<nav id="navbar" class="navbar navbar-expand-lg fixed-top">

    <div class="container-fluid">

        <a class="navbar-brand d-flex align-items-center fw-bold" href="/estoque">
            <img src="../static/senai2.png" id="logo">
            <span class="ms-2">Almoxarifado</span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/estoque">Estoque</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="/retirada">Retirada</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/historico">Histórico</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/logout">Sair</a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<div id="elemento">

    <div id="card">

        <h3 id="titulo-card">Retirada de Itens</h3>

        <div id="acoes">
            <button class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#modalRetirada">
                - Retirar Item
            </button>
        </div>

        <div class="alert alert-info" role="alert">
            <strong>Como funciona:</strong> Selecione um item do estoque e informe a quantidade a ser retirada.
        </div>

    </div>

</div>

<!-- Modal de Retirada -->
<div class="modal fade" id="modalRetirada" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header bg-danger text-white">
        <h5 class="modal-title">Retirar Item do Estoque</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <div class="mb-3">
          <label>Item</label>
          <input type="text" class="form-control" id="itemRetirada" placeholder="Nome do item" required>
        </div>

        <div class="mb-3">
          <label>Quantidade a Retirar</label>
          <input type="number" class="form-control" id="qtdRetirada" min="1" required>
        </div>

        <div class="mb-3">
          <label>Motivo da Retirada</label>
          <textarea class="form-control" id="motivoRetirada" placeholder="Motivo ou observações"></textarea>
        </div>

      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
          Cancelar
        </button>
        <button type="button" class="btn btn-danger" onclick="retirarItem()">
          Confirmar Retirada
        </button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
async function retirarItem() {
    const item = document.getElementById("itemRetirada").value.trim();
    const quantidade = document.getElementById("qtdRetirada").value;
    const motivo = document.getElementById("motivoRetirada").value.trim();

    if (!item || !quantidade) {
        alert("Por favor, preencha todos os campos obrigatórios!");
        return;
    }

    // Aqui você pode enviar para o backend
    alert(`Retirada de ${quantidade} unidades de ${item} registrada!`);
    document.getElementById("itemRetirada").value = "";
    document.getElementById("qtdRetirada").value = "";
    document.getElementById("motivoRetirada").value = "";
}
</script>

</body>
</html>
