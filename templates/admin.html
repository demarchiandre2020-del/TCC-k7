<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/style2.css">
</head>

<body>

<nav id="navbar" class="navbar navbar-expand-lg fixed-top">

    <div class="container-fluid">

        <a class="navbar-brand d-flex align-items-center fw-bold" href="/admin">
            <img src="../static/senai2.png" id="logo">
            <span class="ms-2">Almoxarifado - Admin</span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link active" href="/admin">Dashboard</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/estoque">Estoque</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/historico">Histórico</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/logout">Sair</a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<div id="elemento">

    <div id="card">

        <h3 id="titulo-card">Painel de Administração</h3>

        <div class="alert alert-success" role="alert">
            <strong>Bem-vindo, Admin!</strong> Você está logado como: <strong>{{ email }}</strong>
        </div>

        <div class="row mt-4">
            <div class="col-md-6 mb-3">
                <div class="card bg-primary text-white">
                    <div class="card-body">
                        <h5 class="card-title">Total de Itens</h5>
                        <p class="card-text fs-4">0</p>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-3">
                <div class="card bg-success text-white">
                    <div class="card-body">
                        <h5 class="card-title">Movimentações Hoje</h5>
                        <p class="card-text fs-4">0</p>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-3">
                <div class="card bg-warning text-white">
                    <div class="card-body">
                        <h5 class="card-title">Usuários Ativos</h5>
                        <p class="card-text fs-4">0</p>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-3">
                <div class="card bg-danger text-white">
                    <div class="card-body">
                        <h5 class="card-title">Itens em Baixo Estoque</h5>
                        <p class="card-text fs-4">0</p>
                    </div>
                </div>
            </div>
        </div>

        <hr>

        <h5 class="mt-4">Ações Rápidas</h5>

        <div class="d-grid gap-2 d-md-flex">
            <a href="/estoque" class="btn btn-primary">
                Gerenciar Estoque
            </a>
            <a href="/historico" class="btn btn-info">
                Ver Histórico
            </a>
            <a href="/logout" class="btn btn-danger">
                Logout
            </a>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
