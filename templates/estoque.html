<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/style2.css">
</head>

<body>

  <nav class="navbar navbar-expand-lg bg-primary navbar-dark">

    <div class="container-fluid">
      <img src="../static/senai2.png" id="logo">
      <a id="titulo" class="navbar-brand" href="#">Almoxarifado</a>
  
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
  
      <div class="collapse navbar-collapse" id="navbarNav">
  
        <ul class="navbar-nav ms-auto">
  
          <li class="nav-item">
            <a class="nav-link active" href="#">Home</a>
          </li>
  
          <li class="nav-item">
            <a class="nav-link" href="#">Retirada</a>
          </li>
  
          <li class="nav-item">
            <a class="nav-link" href="#">Histórico</a>
          </li>
  
        </ul>
  
      </div>
  
    </div>
  
  </nav>

<!-- CONTEÚDO -->
<div id="elemento">

    <div id="card">

        <h3 id="titulo">Controle de Estoque</h3>

        <!-- BOTÃO -->
        <div id="acoes">
            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalAdicionar">
                Adicionar Item
            </button>
        </div>

        <!-- TABELA -->
        <table class="table table-striped table-hover" id="tabela">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Quantidade</th>
                    <th>Categoria</th>
                </tr>
            </thead>

            <tbody>
                {% for item in data %}
                <tr>
                    <td>{{ item.id }}</td>
                    <td>{{ item.nome }}</td>
                    <td>{{ item.quantidade }}</td>
                    <td>{{ item.categoria }}</td>
                </tr>
                {% endfor %}
            </tbody>

        </table>

    </div>

</div>

<!-- MODAL -->
<div class="modal fade" id="modalAdicionar" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header bg-success text-white">
        <h5 class="modal-title"> Adicionar Item</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <form method="POST" action="/adicionar">
        <div class="modal-body">

          <div class="mb-3">
            <label class="form-label">Nome do Item</label>
            <input type="text" class="form-control" name="nome" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Categoria</label>
            <input type="text" class="form-control" name="categoria" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Quantidade</label>
            <input type="number" class="form-control" name="quantidade" min="1" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Preço Unitário (R$)</label>
            <input type="number" class="form-control" name="preco" step="0.01" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Descrição</label>
            <textarea class="form-control" name="descricao" rows="3"></textarea>
          </div>

        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
            Cancelar
          </button>
          <button type="submit" class="btn btn-success">
            Salvar
          </button>
        </div>
      </form>

    </div>
  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
